apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "farm-tracks.fullname" . }}
  labels:
    {{- include "farm-tracks.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "farm-tracks.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "farm-tracks.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: frontend
          image: "{{ .Values.image.repository }}-frontend:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.portWeb }}
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

        - name: backend
          image: "{{ .Values.image.repository }}-backend:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: api
              containerPort: {{ .Values.service.portApi }}
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
